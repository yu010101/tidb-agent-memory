<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    background:
      radial-gradient(1200px 600px at 88% -10%, rgba(56,189,180,0.30), transparent 60%),
      radial-gradient(900px 500px at 0% 110%, rgba(99,102,241,0.28), transparent 55%),
      linear-gradient(135deg, #0b1220 0%, #0e1a2b 55%, #0b1622 100%);
    color: #eaf2f7;
    padding: 64px 72px;
    display: flex; flex-direction: column; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .tag {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 22px; font-weight: 700; letter-spacing: .04em;
    color: #7fe3d6; border: 1.5px solid rgba(127,227,214,.45);
    padding: 8px 18px; border-radius: 999px; background: rgba(127,227,214,.06);
  }
  h1 {
    font-size: 56px; font-weight: 800; line-height: 1.22; letter-spacing: .01em;
    margin-top: 26px; max-width: 1010px; text-shadow: 0 2px 18px rgba(0,0,0,.35);
  }
  h1 .accent { color: #5fe0cf; }
  .sub { margin-top: 20px; font-size: 27px; font-weight: 600; color: #b9c8d6; }
  .sub b { color: #eaf2f7; }
  .chips { display: flex; gap: 14px; flex-wrap: wrap; }
  .chip {
    font-size: 22px; font-weight: 700; color: #dff6f1;
    background: rgba(95,224,207,.10); border: 1.5px solid rgba(95,224,207,.30);
    padding: 12px 20px; border-radius: 14px;
  }
  .chip b { color: #5fe0cf; }
  .flow {
    position: absolute; right: 76px; top: 330px; opacity: .95;
    display: flex; align-items: center; gap: 16px;
  }
  .dots { display: grid; grid-template-rows: repeat(5, 1fr); gap: 10px; }
  .dot { width: 18px; height: 18px; border-radius: 50%; background: #6366f1; box-shadow: 0 0 16px rgba(99,102,241,.7); }
  .arrow { font-size: 40px; color: #7fe3d6; }
  .db {
    width: 92px; height: 110px; border-radius: 50% / 16px;
    background: linear-gradient(180deg,#2dd4bf,#0ea5a0);
    box-shadow: 0 8px 30px rgba(45,212,191,.45), inset 0 -10px 20px rgba(0,0,0,.2);
    position: relative;
  }
  .db::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 22px;
    border-radius: 50%; background: #5fe0cf;
  }
  .db span { position:absolute; bottom: 14px; left:0; right:0; text-align:center; font-size:20px; font-weight:800; color:#06262a; }
</style>
</head>
<body>
  <div>
    <span class="tag">⬡ Zenn Fes Spring 2026 ・ TiDB テーマ</span>
    <h1>5社のAIエージェントの<span class="accent">“共有記憶”</span>を、<br>専用ベクトルDBを捨てて <span class="accent">TiDB 1台</span>に畳んだ</h1>
    <div class="sub"><b>構造化フィルタ × ベクトルANN × 全文検索</b> を、<b>1つのSQL</b>で。</div>
  </div>

  <div class="flow">
    <div class="dots"><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i><i class="dot"></i></div>
    <div class="arrow">➜</div>
    <div class="db"><span>TiDB</span></div>
  </div>

  <div class="chips">
    <div class="chip">データストア <b>3 → 1</b></div>
    <div class="chip">hybrid recall@10 <b>0.939</b></div>
    <div class="chip">RRFを<b>生SQLで自前実装</b></div>
    <div class="chip">再現repo <b>+ CI</b></div>
  </div>
</body>
</html>
